name: Weekly Trending Notifications

on:
  schedule:
    # Runs at 12:30 UTC every Friday (6:00 PM IST)
    - cron: '30 12 * * 5'
  workflow_dispatch:
    # Allows you to run it manually from the Actions tab

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Execute Notification Script
        env:
          # These must be set in your GitHub Repository Secrets
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node send-trending-notifications.js
